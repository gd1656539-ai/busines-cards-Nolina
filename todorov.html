

<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дигитална Визитка - Павел Тодоров </title>
    <!-- ФИКСИРАН ЛИНК ЗА ИКОНИ -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #b3d1ff 0%, #ffffff 40%);
            --text-color: #333;
            --accent-color: #555;
            --link-color: #007AFF;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .card-container {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 22px;
            margin: 0;
            font-weight: 600;
        }

        .job-title {
            color: rgb(35, 147, 221);
            font-size: 16px;
            margin: 5px 0 25px 0;
            font-weight: bold;
        }

        .quick-actions {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .quick-actions a {
            font-size: 24px;
            color: var(--accent-color);
            text-decoration: none;
        }

        .info-list {
            text-align: left;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.7);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 0.5px solid #eee;
        }

        .info-item:last-child { border-bottom: none; }

        .info-item i {
            width: 35px;
            color: #555;
            font-size: 18px;
        }

        .info-content label {
            display: block;
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
        }

        .info-content a {
            font-size: 15px;
            color: var(--text-color);
            text-decoration: none;
        }

        .add-contact-btn {
            display: inline-block;
            background: #4A90E2;
            color: white !important;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none !important;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4);
            cursor: pointer;
            border: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="card-container">
    <img src="./Nolina_Email_Signature_Pavel_Todorov.png" alt="Павел Тодоров" class="profile-pic">
    <h1>Павел Тодоров</h1>
    <p class="job-title">Регионален Мениджър Централна  Северна  България</p>

    <div class="quick-actions">
        <a href="tel:+359885410229"><i class="fa-solid fa-phone"></i></a>
        <a href="mailto:todorov@nolina.bg"><i class="fa-solid fa-envelope"></i></a>
        <a href="https://google.com" target="_blank"><i class="fa-solid fa-location-dot"></i></a>
    </div>

    <div class="info-list">
        <div class="info-item" style="border-bottom: none;">
            <i class="fa-solid fa-building"></i>
            <div class="info-content">
                <img src="./logo_Nolina.png" alt="Nolina Logo" style="width: 120px; height: auto;">
            </div>
        </div>

        <div class="info-item">
            <i class="fa-solid fa-mobile-screen"></i>
            <div class="info-content">
                <label>Телефон</label>
                <a href="tel:+359885410229">+359 885 410 229</a>
            </div>
        </div>

        <div class="info-item">
            <i class="fa-solid fa-envelope"></i>
            <div class="info-content">
                <label>Имейл</label>
                <a href="mailto:todorov@nolina.bg">todorov@nolina.bg</a>
            </div>
        </div>

        <div class="info-item">
            <i class="fa-solid fa-globe"></i>
            <div class="info-content">
                <label>Уебсайт</label>
                <a href="http://nolina.bg" target="_blank">www.nolina.bg</a>
            </div>
        </div>
        
    </div>

    <!-- ВАЖНО: Добавен (event) тук -->
    <button class="add-contact-btn" onclick="downloadVcf(event)">
        <i class="fa-solid fa-user-plus"></i> Добави в контакти
    </button>
</div>

<script>
function downloadVcf(event) {
    if (event) event.preventDefault();

    const vcard = "BEGIN:VCARD\r\n" +
                  "VERSION:3.0\r\n" +
                  "FN:Pavel Todorov\r\n" +
                  "ORG:Nolina - Pavel Todorov\r\n" +
                  "TITLE:Regional Manager, North Central Bulgaria\r\n" +
                  "TEL;TYPE=CELL,VOICE:+359885410229\r\n" +
                  "EMAIL;TYPE=PREF,INTERNET:todorov@nolina.bg\r\n" +
                  "URL:http://nolina.bg\r\n" +
                  "END:VCARD";

    const fileName = "Pavel_Todorov.vcf";

    // ПРОВЕРКА ЗА IOS
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

    if (isIOS && navigator.share) {
        const file = new File([vcard], fileName, { type: "text/vcard" });
        navigator.share({
            files: [file],
            title: 'Pavel Todorov'
        }).catch(err => {
            // Fallback ако потребителят затвори прозореца
            forceDownload(vcard, fileName);
        });
    } else {
        // МЕТОД ЗА ANDROID И ДРУГИ (Използваме Data URI с base64)
        forceDownload(vcard, fileName);
    }
}

function forceDownload(vcard, fileName) {
    // Кодираме vCard в Base64, за да не се чупи от специални символи
    const base64Vcard = btoa(unescape(encodeURIComponent(vcard)));
    const dataUri = 'data:text/vcard;base64,' + base64Vcard;
    
    const link = document.createElement('a');
    link.href = dataUri;
    link.setAttribute('download', fileName);
    link.style.display = 'none';
    
    document.body.appendChild(link);
    link.click();
    
    setTimeout(() => {
        document.body.removeChild(link);
    }, 100);
}
</script>

</body>
</html>
