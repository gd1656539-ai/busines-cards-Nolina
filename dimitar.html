
<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Card - Dimitar Hristov</title>
    <!-- ПОПРАВЕН ЛИНК ЗА ИКОНИ -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #b3d1ff 0%, #ffffff 40%);
            --text-color: #333;
            --accent-color: #555;
            --link-color: #007AFF;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .card-container {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 22px;
            margin: 0;
            font-weight: 600;
        }

        .job-title {
            color: #2393dd;
            font-size: 16px;
            margin: 5px 0 25px 0;
        }

        .quick-actions {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .quick-actions a {
            font-size: 24px;
            color: var(--accent-color);
            text-decoration: none;
        }

        .info-list {
            text-align: left;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.7);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 0.5px solid #eee;
        }

        .info-item:last-child { border-bottom: none; }

        .info-item i {
            width: 35px;
            color: #555;
            font-size: 18px;
        }

        .info-content label {
            display: block;
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
        }

        .info-content a {
            font-size: 15px;
            color: var(--text-color);
            text-decoration: none;
        }

        .add-contact-btn {
            display: inline-block;
            background: #4A90E2;
            color: white !important;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none !important;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4);
            cursor: pointer;
            border: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- ФУНКЦИЯТА СЕ ИЗВИКВА С EVENT -->
    <button class="add-contact-btn" onclick="downloadVcf(event)">
        <i class="fa-solid fa-user-plus"></i> Add to Contacts
    </button>
</div>

<script>
function downloadVcf(event) {
    event.preventDefault(); // Спира презареждането на страницата

    const vcard = "BEGIN:VCARD\r\n" +
                  "VERSION:3.0\r\n" +
                  "FN:Dimitar Hristov\r\n" +
                  "ORG:Nolina\r\n" +
                  "TITLE:Regional Manager Sofia\r\n" +
                  "TEL;TYPE=CELL,VOICE:+359887429665\r\n" +
                  "EMAIL;TYPE=PREF,INTERNET:d-hristov@nolina.bg\r\n" +
                  "ADR;TYPE=WORK:;;9 Asen Yodranov Blvd.;Sofia;;1592;Bulgaria\r\n" +
                  "URL:http://nolina.bg\r\n" +
                  "END:VCARD";

    const fileName = "Dimitar_Hristov.vcf";
    const mimeType = "text/vcard";

    // Проверка за iOS/Android Share API
    if (navigator.share && navigator.canShare) {
        const file = new File([vcard], fileName, { type: mimeType });
        if (navigator.canShare({ files: [file] })) {
            navigator.share({
                files: [file],
                title: 'Dimitar Hristov',
                text: 'Contact details for Dimitar Hristov'
            }).catch(err => {
                console.log("Share failed:", err);
                fallbackDownload(vcard, fileName, mimeType);
            });
            return;
        }
    }

    fallbackDownload(vcard, fileName, mimeType);
}

function fallbackDownload(vcard, fileName, mimeType) {
    const blob = new Blob([vcard], { type: mimeType });
    const url = window.URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    setTimeout(() => {
        document.body.removeChild(link);
        window.URL.revokeObjectURL(url);
    }, 100);
}
</script>
